name: Auto Run DC Model

on:
  push:
    paths:
      - 'saavu2.xlsx'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn folium matplotlib openpyxl

      - name: Run model
        run: |
          python weighted_kmeans.py

            - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update outputs" || echo "No changes"
          git push

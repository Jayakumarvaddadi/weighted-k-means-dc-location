name: Auto Run DC Model

on: push

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install pandas numpy scikit-learn folium matplotlib openpyxl ortools
      - run: python weighted_kmeans.py
      - run: python dc2_optimizer.py
      - run: python dc3_optimizer.py
      - run: python dc4_optimizer.py
      - run: python dc5_optimizer.py
      - run: python dc6_optimizer.py
      - run: python store_cost_allocator.py
      
      - run: |
         git config --global user.name "github-actions"
         git config --global user.email "actions@github.com"
         git add .
         git commit -m "Auto update outputs" || echo "No changes"
         git push origin main --force
    
